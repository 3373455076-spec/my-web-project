<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学科竞赛备赛</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 50px 60px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 800px;
            width: 100%;
        }
        
        .header {
            margin-bottom: 40px;
        }
        
        .back-btn {
            display: inline-block;
            padding: 8px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 20px;
            transition: background 0.3s;
        }
        
        .back-btn:hover {
            background: #5568d3;
        }
        
        h1 {
            font-size: 24px;
            color: #333;
        }
        
        .icon-grid {
            display: grid;
            flex-wrap:wrap;
            gap: 150px;
            justify-items: center;
        }
        
        .icon-item {
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .icon-item:hover {
            transform: translateY(-5px);
        }
        
        .icon-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 10px;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            transition: box-shadow 0.3s;
        }
        
        .icon-item:hover .icon-circle {
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }
        
        .icon-circle i {
            font-size: 32px;
            color: white;
        }
        
        .icon-label {
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href=" " class="back-btn">
                <i class="fas fa-arrow-left"></i> 返回主页
            </a >
            <h1>学科竞赛备赛</h1>
        </div>
        
        <div class="icon-grid">
            <a href="https://www.bilibili.com" target="_blank" class="icon-item">
                <div class="icon-circle">
                    <i class="fas fa-play-circle"></i>
                </div>
                <span class="icon-label">比赛型</span>
            </a >
            
            <a href="https://www.youku.com" target="_blank" class="icon-item">
                <div class="icon-circle">
                    <i class="fas fa-video"></i>
                </div>
                <span class="icon-label">挑战杯型</span>
            </a >
            
        </div>
    </div>
</body>
</html>

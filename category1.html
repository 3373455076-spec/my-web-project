<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>专业技术学习 - 智能学院</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft Yahei', 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.96);
            padding: 40px 30px 50px 30px;
            border-radius: 40px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            max-width: 1000px;
            width: 100%;
        }

        .header {
            margin-bottom: 45px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 22px;
            background: linear-gradient(120deg, #667eea, #5a67d8);
            color: white;
            text-decoration: none;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 20px;
            transition: all 0.25s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .back-btn:hover {
            background: linear-gradient(120deg, #5a67d8, #4c51bf);
            transform: translateY(-2px);
        }

        h1 {
            font-size: 2.2rem;
            color: #1e293b;
            font-weight: 700;
        }
        
        h1:after {
            content: '';
            display: block;
            width: 60%;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #c084fc);
            border-radius: 3px;
            margin: 12px auto 0;
        }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px 30px;
            margin-top: 30px;
        }

        .icon-item {
            text-align: center;
            cursor: pointer;
            transition: transform 0.25s ease;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .icon-item:hover {
            transform: translateY(-6px);
        }

        .icon-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 16px;
            box-shadow: 0 12px 18px -8px rgba(102, 126, 234, 0.4);
            transition: all 0.25s ease;
        }

        .icon-item:hover .icon-circle {
            box-shadow: 0 18px 28px -8px rgba(102, 126, 234, 0.65);
            transform: scale(1.02);
        }

        .icon-circle i {
            font-size: 44px;
            color: white;
        }

        .icon-label {
            font-size: 0.95rem;
            font-weight: 550;
            color: #1e293b;
            padding: 6px 12px;
            border-radius: 40px;
            display: inline-block;
            word-break: break-word;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px 40px 20px;
            }
            
            .icon-grid {
                gap: 30px 20px;
            }
            
            .icon-circle {
                width: 85px;
                height: 85px;
            }
            
            .icon-circle i {
                font-size: 38px;
            }
            
            .icon-label {
                font-size: 0.85rem;
                padding: 4px 8px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 480px) {
            .icon-grid {
                gap: 25px 15px;
            }
            
            .icon-circle {
                width: 75px;
                height: 75px;
            }
            
            .icon-circle i {
                font-size: 32px;
            }
            
            .icon-label {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <a href="index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> 返回主页
        </a >
        <h1>专业技术学习</h1>
    </div>

    <div class="icon-grid">
        <a href="https://doubao.com/bot/bFpZwW2T" target="_blank" class="icon-item">
            <div class="icon-circle">
                <i class="fas fa-microchip"></i>
            </div>
            <span class="icon-label">智能产品开发与应用</span>
        </a >

        <a href="https://doubao.com/bot/db3peHWw" target="_blank" class="icon-item">
            <div class="icon-circle">
                <i class="fas fa-wifi"></i>
            </div>
            <span class="icon-label">物联网应用技术</span>
        </a >

        <a href="https://doubao.com/bot/QdumXIPU" target="_blank" class="icon-item">
            <div class="icon-circle">
                <i class="fas fa-bolt"></i>
            </div>
            <span class="icon-label">应用电子技术</span>
        </a >

        <a href="https://doubao.com/bot/pePcWDsU" target="_blank" class="icon-item">
            <div class="icon-circle">
                <i class="fas fa-chart-line"></i>
            </div>
            <span class="icon-label">大数据技术</span>
        </a >

        <a href="https://doubao.com/bot/w2ncStex" target="_blank" class="icon-item">
            <div class="icon-circle">
                <i class="fas fa-brain"></i>
            </div>
            <span class="icon-label">人工智能技术应用</span>
        </a >

        <a href="https://doubao.com/bot/mcoBeYng" target="_blank" class="icon-item">
            <div class="icon-circle">
                <i class="fas fa-mobile-alt"></i>
            </div>
            <span class="icon-label">移动应用开发</span>
        </a >

        <a href="https://doubao.com/bot/JvXcHXtm" target="_blank" class="icon-item">
            <div class="icon-circle">
                <i class="fab fa-linux"></i>
            </div>
            <span class="icon-label">Linux课程导师</span>
        </a >

        <a href="https://doubao.com/bot/wyuT6uxv" target="_blank" class="icon-item">
            <div class="icon-circle">
                <i class="fas fa-project-diagram"></i>
            </div>
            <span class="icon-label">物联网工程项目导师</span>
        </a >

        <a href="https://doubao.com/bot/QPP7IWxw" target="_blank" class="icon-item">
            <div class="icon-circle">
                <i class="fas fa-chalkboard-teacher"></i>
            </div>
            <span class="icon-label">全能学习导师</span>
        </a >
    </div>
</div>
</body>
</html>
